<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Hub</title>
    <meta name="apple-mobile-web-app-title" content="Scout Hub">
    <meta name="application-name" content="Scout Hub">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#003F87">
    <link rel="icon" id="dynamic-favicon" href="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png">
    <link rel="apple-touch-icon" id="dynamic-apple-icon" href="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
        :root { --bsa-blue: #003F87; --bsa-red: #CE1126; --bsa-gold: #FDC82F; }
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; transition: background-color 0.5s ease; }
        .dark body { background-color: #020617; color: #f8fafc; }
        .scout-card { background: white; border-radius: 1.5rem; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(0,63,135,0.05); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .dark .scout-card { background: #0f172a; border-color: rgba(255,255,255,0.05); }
        .scout-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1); border-color: var(--bsa-blue); }
        .plan-card, .res-card { background: white; border-radius: 2rem; border-left: 8px solid var(--bsa-gold); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); transition: all 0.2s ease; }
        .dark .plan-card, .dark .res-card { background: #1e293b; border-color: rgba(255,255,255,0.05); border-left-color: var(--bsa-gold); }
        .comm-card { background: white; border-radius: 1.5rem; border-left: 8px solid var(--bsa-blue); box-shadow: 0 8px 12px -3px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        .dark .comm-card { background: #1e293b; border-color: rgba(255,255,255,0.05); border-left-color: var(--bsa-blue); }
        .rt-card { background: white; border-radius: 1.5rem; border-left: 8px solid var(--bsa-gold); box-shadow: 0 8px 12px -3px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        .dark .rt-card { background: #1e293b; border-color: rgba(255,255,255,0.05); border-left-color: var(--bsa-gold); }
        .vol-card { background: white; border-radius: 2rem; border-left: 8px solid var(--bsa-red); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); transition: all 0.2s ease; }
        .dark .vol-card { background: #1e293b; border-color: rgba(255,255,255,0.05); border-left-color: var(--bsa-red); }
        .image-viewport { width: 100%; aspect-ratio: 1 / 1; position: relative; overflow: hidden; border-radius: 1rem; background: #f1f5f9; -webkit-mask-image: -webkit-radial-gradient(white, black); mask-image: radial-gradient(white, black); transform: translateZ(0); }
        .dark .image-viewport { background: #1e293b; }
        input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 8px; background: #e2e8f0; border-radius: 5px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; background: var(--bsa-blue); border-radius: 50%; cursor: pointer; border: 2px solid white; }
        .modal-animate { animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .sortable-ghost { opacity: 0.4; transform: scale(0.95); }
        .sortable-drag { cursor: grabbing !important; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark textarea::-webkit-scrollbar-thumb { background: #475569; }
        .cost-indicator { font-size: 1.25rem; font-weight: 900; color: #cbd5e1; cursor: pointer; transition: color 0.2s; }
        .cost-indicator.active { color: #16a34a; }
        .dark .cost-indicator { color: #475569; }
        .dark .cost-indicator.active { color: #4ade80; }
        .unapproved-card { border: 2px dashed #eab308 !important; background: #fefce8 !important; }
        .dark .unapproved-card { border-color: #a16207 !important; background: #422006 !important; }
    </style>
</head>
<body class="min-h-screen relative">
    <div id="toast-container" class="fixed top-8 left-1/2 -translate-x-1/2 z-[1000] flex flex-col gap-3 pointer-events-none"></div>

    <div id="app">
        <header id="main-header" class="bg-white dark:bg-slate-900 border-b-[8px] border-yellow-400 shadow-xl px-4 md:px-6 py-4 md:py-6 transition-colors relative z-30 overflow-hidden">
            <div id="header-bg-layer" class="absolute inset-0 z-0 pointer-events-none hidden">
                <img id="header-bg-img" src="" class="absolute inset-0 w-full h-full object-cover">
            </div>

            <div class="max-w-6xl mx-auto relative z-10">
                <div class="flex flex-col md:flex-row items-center justify-between gap-4 md:gap-6">
                    <div class="flex flex-row items-center gap-4 w-full md:w-auto md:flex-1">
                        <div class="relative group flex-shrink-0">
                            <div id="header-logo-container" class="w-20 h-20 md:w-32 md:h-32 rounded-[1.25rem] md:rounded-[2rem] bg-slate-50 dark:bg-slate-800 shadow-inner overflow-hidden border-4 border-white dark:border-slate-700 transition-all relative">
                                <img id="main-logo" src="https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png" class="absolute inset-0 w-full h-full object-contain">
                            </div>
                            <button id="edit-header-btn" onclick="window.openHeaderModal()" class="hidden absolute -bottom-1 -right-1 md:-bottom-2 md:-right-2 p-2 md:p-2.5 bg-blue-600 text-white rounded-xl shadow-xl hover:scale-110 transition-transform z-20"></button>
                        </div>
                        <div class="text-left flex-1 relative group md:pr-12">
                            <h1 id="display-title" class="text-3xl sm:text-4xl md:text-6xl font-black text-blue-900 dark:text-blue-500 uppercase tracking-tighter mb-0.5 md:mb-1 leading-none drop-shadow-md">Pack 26</h1>
                            <div class="text-[11px] sm:text-xs md:text-xl font-bold text-slate-500 dark:text-slate-400 uppercase tracking-[0.2em] md:tracking-[0.4em] flex items-center justify-start gap-3 drop-shadow-md">
                                <span id="display-subtitle">Scouting America</span>
                            </div>
                            <button id="edit-text-btn" onclick="window.openHeaderModal()" class="hidden absolute top-1/2 -translate-y-1/2 right-0 md:-right-4 p-2 md:p-3 bg-blue-600 text-white rounded-xl shadow-xl hover:scale-110 transition-transform"></button>
                        </div>
                    </div>

                    <div class="flex flex-row items-center justify-between w-full md:w-auto md:flex-col md:items-end gap-2 md:gap-3 mt-1 md:mt-0 border-t border-slate-200/50 dark:border-slate-800/50 pt-3 md:border-0 md:pt-0">
                        <div class="flex flex-col items-start md:items-end gap-1 md:gap-1.5 drop-shadow-md">
                            <a id="header-external-link" href="https://my.scouting.org" target="_blank" class="text-[10px] md:text-xs font-black text-red-800 dark:text-red-500 hover:text-red-900 dark:hover:text-red-400 hover:underline uppercase tracking-widest flex items-center gap-1.5 transition-colors pr-1">
                                <i data-lucide="external-link" class="w-3.5 h-3.5"></i> my.scouting.org
                            </a>
                        </div>
                        <div class="flex items-center gap-2 md:gap-4 flex-shrink-0">
                            <button id="home-btn" onclick="window.switchView('links')" class="hidden p-2.5 md:p-3 rounded-xl bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 hover:bg-blue-600 hover:text-white transition-all shadow-md flex items-center justify-center group">
                                <i data-lucide="home" class="w-4 h-4 md:w-5 md:h-5 group-hover:scale-110 transition-transform"></i>
                            </button>
                            <button id="theme-btn" onclick="window.toggleDarkMode()" class="p-2.5 md:p-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-yellow-400 hover:text-blue-900 transition-all shadow-md flex items-center justify-center"></button>
                            <button id="header-design-btn" onclick="window.openHeaderDesignModal()" class="hidden p-2.5 md:px-4 md:py-3 rounded-xl bg-teal-100 dark:bg-teal-900/30 text-teal-700 dark:text-teal-400 hover:bg-teal-600 hover:text-white transition-all shadow-md items-center justify-center gap-2 group">
                                <i data-lucide="paint-roller" class="w-4 h-4 md:w-4 md:h-4 group-hover:scale-110 transition-transform"></i><span class="hidden md:inline font-bold uppercase tracking-widest text-[10px] md:text-xs">Header Design</span>
                            </button>
                            <button id="app-icon-edit-btn" onclick="window.openAppIconModal()" class="hidden p-2.5 md:px-4 md:py-3 rounded-xl bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400 hover:bg-purple-600 hover:text-white transition-all shadow-md items-center justify-center gap-2 group">
                                <i data-lucide="smartphone" class="w-4 h-4 md:w-4 md:h-4 group-hover:scale-110 transition-transform"></i><span class="hidden md:inline font-bold uppercase tracking-widest text-[10px] md:text-xs">App Icon</span>
                            </button>
                            <button id="admin-toggle-btn" onclick="window.toggleAdminMode()" class="hidden"></button>
                        </div>
                    </div>
                </div>

                <div id="leader-nav" class="hidden mt-4 flex flex-wrap justify-center md:justify-start gap-2 border-t border-slate-200/50 dark:border-slate-800/50 pt-4">
                    <button onclick="window.switchView('links')" id="tab-links" class="px-3 md:px-4 py-1.5 md:py-2 rounded-full font-bold uppercase tracking-widest text-[9px] md:text-[10px] transition-colors shadow-sm">Resources</button>
                    <button onclick="window.switchView('planner')" id="tab-planner" class="px-3 md:px-4 py-1.5 md:py-2 rounded-full font-bold uppercase tracking-widest text-[9px] md:text-[10px] transition-colors shadow-sm">Planner</button>
                    <button onclick="window.switchView('committee')" id="tab-committee" class="px-3 md:px-4 py-1.5 md:py-2 rounded-full font-bold uppercase tracking-widest text-[9px] md:text-[10px] transition-colors shadow-sm">Committee</button>
                    <button onclick="window.switchView('volunteer')" id="tab-volunteer" class="px-3 md:px-4 py-1.5 md:py-2 rounded-full font-bold uppercase tracking-widest text-[9px] md:text-[10px] transition-colors shadow-sm">Positions</button>
                    <button onclick="window.switchView('recipes')" id="tab-recipes" class="px-3 md:px-4 py-1.5 md:py-2 rounded-full font-bold uppercase tracking-widest text-[9px] md:text-[10px] transition-colors shadow-sm">Recipes</button>
                    <button onclick="window.switchView('ceremonies')" id="tab-ceremonies" class="px-3 md:px-4 py-1.5 md:py-2 rounded-full font-bold uppercase tracking-widest text-[9px] md:text-[10px] transition-colors shadow-sm">Ceremonies</button>
                    <button onclick="window.switchView('skits')" id="tab-skits" class="px-3 md:px-4 py-1.5 md:py-2 rounded-full font-bold uppercase tracking-widest text-[9px] md:text-[10px] transition-colors shadow-sm">Skits</button>
                    <button onclick="window.switchView('games')" id="tab-games" class="px-3 md:px-4 py-1.5 md:py-2 rounded-full font-bold uppercase tracking-widest text-[9px] md:text-[10px] transition-colors shadow-sm">Activities</button>
                </div>
            </div>
        </header>

        <main class="max-w-[90rem] mx-auto py-8 md:py-12 px-4 sm:px-6 flex flex-col items-center min-h-[50vh]" id="main-container"></main>

        <div class="fixed bottom-6 right-6 md:bottom-10 md:right-10 z-50">
            <button id="lock-btn" onclick="window.handleAuthClick()"></button>
        </div>
    </div>

    <div id="login-modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[200] hidden items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 rounded-3xl w-full max-w-sm overflow-hidden flex flex-col shadow-2xl modal-animate border-b-8 border-yellow-400">
            <div class="bg-blue-900 p-5 text-white flex justify-between items-center">
                <h3 class="text-lg font-black uppercase tracking-widest flex items-center gap-2"><i data-lucide="shield-check" class="w-4 h-4"></i> Secure Access</h3>
                <button onclick="window.closeLoginModal()" class="p-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div class="p-6 sm:p-8 flex flex-col gap-5">
                <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest text-center leading-relaxed">Enter your secure access key below.</p>
                <div class="relative">
                    <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Access Key</label>
                    <div class="relative flex items-center">
                        <input type="password" id="login-password" class="w-full p-3 pr-10 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold text-base outline-none focus:ring-2 ring-blue-900/10 dark:text-white transition-all tracking-widest" placeholder="••••••••" onkeydown="if(event.key === 'Enter') window.submitLogin()">
                        <button id="toggle-password-btn" onclick="window.togglePasswordVisibility()" class="absolute right-3 text-slate-400 hover:text-blue-600 transition-colors focus:outline-none"><i data-lucide="eye" class="w-4 h-4"></i></button>
                    </div>
                </div>
                <button onclick="window.submitLogin()" class="w-full py-3 bg-yellow-400 text-blue-900 rounded-xl font-black uppercase tracking-widest shadow-xl hover:bg-yellow-300 transition-all active:scale-95 flex justify-center items-center gap-2">Unlock <i data-lucide="key" class="w-4 h-4"></i></button>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[100] hidden items-center justify-center p-4 sm:p-6">
        <div class="bg-white dark:bg-slate-900 rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl modal-animate border-b-8 border-blue-900">
            <div class="bg-blue-900 p-4 sm:p-5 text-white flex justify-between items-center">
                <h3 id="modal-title" class="text-lg md:text-xl font-black uppercase tracking-widest">Settings</h3>
                <button onclick="window.closeModal()" class="p-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-5 sm:p-6 md:p-8 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8" id="modal-grid">
                <div class="space-y-4">
                    <div id="field-title">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Title</label>
                        <input id="input-title" class="w-full p-2.5 sm:p-3 bg-slate-100 dark:bg-slate-800 rounded-xl font-bold text-sm sm:text-base outline-none dark:text-white transition-all">
                    </div>
                    <div id="field-url">
                        <div class="flex justify-between items-end mb-1">
                            <label class="text-[10px] font-black uppercase text-slate-400 tracking-widest" id="label-url">Target / URL</label>
                            <select id="input-link-type" onchange="window.toggleLinkType()" class="text-[10px] font-bold uppercase text-blue-600 dark:text-blue-400 bg-transparent outline-none cursor-pointer">
                                <option value="external">External Link</option>
                                <option value="internal">Internal App Page</option>
                            </select>
                        </div>
                        <input id="input-url" class="w-full p-2.5 sm:p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-sm sm:text-base outline-none dark:text-white transition-all" placeholder="https://...">
                        <select id="input-internal-target" class="w-full p-2.5 sm:p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-sm sm:text-base outline-none dark:text-white font-bold transition-all hidden cursor-pointer">
                            <option value="#volunteer">Volunteer Positions</option>
                            <option value="#planner">Pack Planner</option>
                            <option value="#committee">Committee Notes</option>
                            <option value="#recipes">Recipe Keeper</option>
                            <option value="#ceremonies">Ceremony Scripts</option>
                            <option value="#skits">Skits</option>
                            <option value="#games">Games & Activities</option>
                        </select>
                    </div>
                    <div id="field-category" class="hidden">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Category</label>
                        <select id="input-category" class="w-full p-2.5 sm:p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-sm font-bold outline-none dark:text-white transition-all cursor-pointer"></select>
                    </div>
                    <div id="field-header-type" class="hidden">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Background Style</label>
                        <select id="input-header-bg-type" onchange="window.updatePreview()" class="w-full p-2.5 sm:p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-sm font-bold outline-none dark:text-white cursor-pointer">
                            <option value="default">Default</option><option value="color">Solid Color</option><option value="image">Custom Image</option>
                        </select>
                    </div>
                    <div id="field-header-colors" class="hidden grid-cols-2 gap-4">
                        <div><label class="text-[10px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Bg Color</label><input type="color" id="input-header-bg-color" onchange="window.updatePreview()" class="w-full h-10 rounded-xl cursor-pointer"></div>
                        <div><label class="text-[10px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Border Color</label><input type="color" id="input-header-border-color" onchange="window.updatePreview()" class="w-full h-10 rounded-xl cursor-pointer"></div>
                    </div>
                    <div id="field-header-image" class="hidden">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Header Image URL</label>
                        <input id="input-header-bg-image" oninput="window.updatePreview()" class="w-full p-2.5 sm:p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-xs sm:text-sm font-mono outline-none dark:text-white">
                    </div>
                    <div id="field-image">
                        <label id="label-image" class="text-[10px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Image Source URL</label>
                        <input id="input-image" class="w-full p-2.5 sm:p-3 bg-slate-100 dark:bg-slate-800 rounded-xl text-xs sm:text-sm font-mono outline-none dark:text-white">
                        <div id="app-icon-help-text" class="hidden text-xs font-bold text-slate-500 mt-2">Used for browser tab.</div>
                    </div>
                    <div id="field-link-bg" class="hidden">
                        <label class="text-[10px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Tile Background Color</label>
                        <div class="flex items-center gap-3 mt-1">
                            <input type="checkbox" id="input-link-custom-bg-enable" onchange="document.getElementById('input-link-bg').disabled = !this.checked; window.updatePreview()" class="w-4 h-4 cursor-pointer">
                            <label for="input-link-custom-bg-enable" class="text-[10px] font-bold text-slate-600 dark:text-slate-300 uppercase cursor-pointer">Custom Color</label>
                            <input type="color" id="input-link-bg" oninput="window.updatePreview()" class="w-10 h-8 rounded cursor-pointer border-none bg-transparent" disabled>
                        </div>
                    </div>
                    <div id="field-link-event" class="hidden flex-col gap-2 mt-2 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700">
                        <div class="flex items-center gap-2.5">
                            <input type="checkbox" id="input-link-is-event" onchange="document.getElementById('link-event-date-wrapper').style.display = this.checked ? 'block' : 'none'" class="w-4 h-4 cursor-pointer">
                            <label class="text-[11px] font-black uppercase text-slate-600 dark:text-slate-300 tracking-widest cursor-pointer" for="input-link-is-event">Is this an Event?</label>
                        </div>
                        <div id="link-event-date-wrapper" style="display: none;" class="mt-1">
                            <label class="text-[9px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Event Date (Expires day after)</label>
                            <input type="date" id="input-link-event-date" class="w-full p-2 bg-white dark:bg-slate-900 rounded-lg text-xs font-bold outline-none dark:text-white cursor-pointer border border-slate-200 dark:border-slate-700">
                        </div>
                    </div>
                    <div id="field-header-text-colors" class="hidden flex-col gap-3 mt-2 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700">
                        <div class="flex items-center gap-2.5">
                            <input type="checkbox" id="input-override-colors" onchange="document.getElementById('color-pickers-wrapper').style.display = this.checked ? 'grid' : 'none'" class="w-4 h-4 cursor-pointer">
                            <label class="text-[11px] font-black uppercase text-slate-600 dark:text-slate-300 tracking-widest cursor-pointer" for="input-override-colors">Custom Font Colors</label>
                        </div>
                        <div id="color-pickers-wrapper" class="grid-cols-2 gap-4 mt-1" style="display: none;">
                            <div><label class="text-[9px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Title</label><input type="color" id="input-title-color" class="w-full h-8 cursor-pointer border-none bg-transparent"></div>
                            <div><label class="text-[9px] font-black uppercase text-slate-400 mb-1 block tracking-widest">Subtitle</label><input type="color" id="input-subtitle-color" class="w-full h-8 cursor-pointer border-none bg-transparent"></div>
                        </div>
                    </div>
                    <div id="field-header-link-settings" class="hidden flex-col space-y-3 mt-2 p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-slate-200 dark:border-slate-700">
                        <div class="flex items-center gap-2.5 mb-1">
                            <input type="checkbox" id="input-show-header-link" class="w-4 h-4 cursor-pointer">
                            <label class="text-[11px] font-black uppercase text-slate-600 dark:text-slate-300 cursor-pointer" for="input-show-header-link">Show Header Link</label>
                        </div>
                        <div><label class="text-[9px] font-black uppercase text-slate-400 mb-1 block">Text</label><input id="input-header-link-text" class="w-full p-2.5 bg-white dark:bg-slate-900 rounded-lg text-xs dark:text-white"></div>
                        <div><label class="text-[9px] font-black uppercase text-slate-400 mb-1 block">URL</label><input id="input-header-link-url" class="w-full p-2.5 bg-white dark:bg-slate-900 rounded-lg text-xs dark:text-white"></div>
                    </div>

            const size = 192; const canvas = document.createElement('canvas'); canvas.width = size; canvas.height = size; const ctx = canvas.getContext('2d');
            const img = new Image(); img.crossOrigin = "anonymous"; 
            img.onload = () => {
                ctx.clearRect(0, 0, size, size); const aspect = img.width / img.height; let drawW = size; let drawH = size;
                if (aspect > 1) drawH = size / aspect; else drawW = size * aspect;
                ctx.translate(size/2 + ((x||0)/100*size), size/2 + ((y||0)/100*size)); ctx.scale(zoom||1, zoom||1); ctx.drawImage(img, -drawW/2, -drawH/2, drawW, drawH);
                try { const dataUrl = canvas.toDataURL('image/png'); if(favicon) favicon.href = dataUrl; if(appleIcon) appleIcon.href = dataUrl; } catch(e) {}
            };
            img.src = url;
        };

                const sec = document.createElement('div'); sec.className = 'category-section w-full sm:w-[calc(50%-1.5rem)] lg:w-[calc(33.333%-2rem)] min-w-[300px] max-w-lg bg-slate-100 dark:bg-slate-800 rounded-[3rem] p-6 sm:p-8 shadow-xl border border-white dark:border-slate-700 flex flex-col relative'; sec.dataset.id = cat.id;
                sec.innerHTML = `<div class="flex items-center justify-between gap-4 mb-6 px-2"><h2 class="text-blue-900 dark:text-blue-400 font-black uppercase tracking-widest text-lg">${cat.title}</h2>${isEditing ? `<div class="flex gap-2 no-drag"><button class="category-drag-handle p-2 bg-white text-slate-400 cursor-move"><i data-lucide="grip-horizontal" class="w-4 h-4 pointer-events-none"></i></button><button onclick="window.editCategory('${cat.id}')" class="p-2 bg-white text-slate-400"><i data-lucide="edit-3" class="w-4 h-4"></i></button><button onclick="window.deleteCategory('${cat.id}')" class="p-2 bg-white text-slate-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>` : ''}</div>`;
                const grid = document.createElement('div'); grid.className = 'link-grid grid grid-cols-3 gap-3 sm:gap-4 min-h-[120px]'; grid.dataset.categoryId = cat.id;
                
                links.filter(l => l.categoryId === cat.id).forEach(link => {
                    let isExpired = false;
                    if (link.isEvent && link.eventDate) {
                        const [y, m, d] = link.eventDate.split('-').map(Number);
                        const expDate = new Date(y, m - 1, d);
                        expDate.setDate(expDate.getDate() + 1);
                        if (today >= expDate) isExpired = true;
                    }
                    if (isExpired && !isEditing) return;

                    const card = document.createElement('div'); card.className = `link-card relative group ${isEditing ? 'cursor-move' : ''}`; card.dataset.id = link.id;
                    const isInt = link.url && link.url.startsWith('#'); const tUrl = isEditing || isInt ? 'javascript:void(0)' : link.url; const oc = !isEditing && isInt ? `onclick="window.switchView('${link.url.substring(1)}'); return false;"` : '';
                    
                    const expiredBadge = isExpired && isEditing ? `<div class="absolute -top-2 left-1/2 -translate-x-1/2 bg-red-600 text-white text-[8px] font-black uppercase px-2 py-0.5 rounded-full z-30 shadow-md whitespace-nowrap">Expired</div>` : '';
                    const opacityClass = isExpired ? 'opacity-50 grayscale' : '';

                    card.innerHTML = `${expiredBadge}${isEditing ? `<div class="absolute top-2 right-2 z-20 flex flex-col gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity no-drag cursor-default"><button onclick="window.editLink(${link.id})" class="p-1.5 bg-blue-600 text-white rounded-lg"><i data-lucide="edit-2" class="w-3 h-3"></i></button><button onclick="window.deleteLink(${link.id})" class="p-1.5 bg-red-600 text-white rounded-lg"><i data-lucide="trash-2" class="w-3 h-3"></i></button></div>` : ''}<a href="${tUrl}" ${oc} target="${isInt ? '_self' : '_blank'}" class="scout-card p-3 md:p-4 flex flex-col items-center justify-start text-center block h-full ${opacityClass} ${isEditing?'pointer-events-none':''}"><div class="image-viewport mb-2 sm:mb-3" style="${link.customBg ? `background-color: ${link.bgColor};` : ''}"><img src="${link.img || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png'}" style="transform: translate(${link.x || 0}%, ${link.y || 0}%) scale(${link.zoom || 1}); opacity: ${link.img ? 1 : 0.1}" class="absolute inset-0 w-full h-full object-contain pointer-events-none"></div><span class="text-blue-900 dark:text-slate-200 font-extrabold uppercase tracking-widest text-[9px] sm:text-[10px] line-clamp-2 leading-tight">${link.title}</span></a>`;
                    grid.appendChild(card);
                });
                
                if (isEditing) { const addBtn = document.createElement('button'); addBtn.onclick = () => window.addNewLink(cat.id); addBtn.className = 'no-drag scout-card border-4 border-dashed border-slate-300 bg-transparent flex flex-col items-center justify-center p-3 opacity-50 h-full min-h-[120px] w-full'; addBtn.innerHTML = '<i data-lucide="plus" class="w-8 h-8 text-slate-400 mb-2 pointer-events-none"></i><span class="font-black text-slate-400 uppercase tracking-widest pointer-events-none text-[9px] leading-tight text-center">Add Link</span>'; grid.appendChild(addBtn); }
                sec.appendChild(grid); cw.appendChild(sec);
            });
            container.appendChild(cw);
            if (isEditing) { const aw = document.createElement('div'); aw.className = 'mt-12 flex justify-center w-full'; aw.innerHTML = `<button onclick="window.addNewCategory()" class="px-8 py-4 bg-white border-4 border-dashed border-slate-300 rounded-[2rem] text-slate-400 font-black uppercase tracking-widest flex items-center gap-3"><i data-lucide="plus-circle" class="w-6 h-6"></i> Add Category</button>`; container.appendChild(aw); }
            if (isEditing && window.Sortable) {
                new Sortable(document.getElementById('category-wrapper'), { animation: 250, handle: '.category-drag-handle', onEnd: function() { categories = Array.from(document.querySelectorAll('.category-section')).map(el => categories.find(c => c.id === el.dataset.id)); if (useFirebase) window.syncToCloud(); } });
                document.querySelectorAll('.link-grid').forEach(g => new Sortable(g, { group: 'shared-links', animation: 250, filter: '.no-drag', onMove: (e) => e.related.className.indexOf('no-drag') === -1, onEnd: function() { const nl = []; document.querySelectorAll('.link-grid').forEach(gr => gr.querySelectorAll('.link-card').forEach(c => { const l = links.find(lk => lk.id === parseInt(c.dataset.id)); if (l) { l.categoryId = gr.dataset.categoryId; nl.push(l); } })); links = nl; if (useFirebase) window.syncToCloud(); } }));
            }
        }

        window.handleAuthClick = function() { if (isAdmin || isLeader) { isAdmin = false; isLeader = false; isEditing = false; currentView = 'links'; window.render(); } else { document.getElementById('login-password').value = ''; document.getElementById('login-password').type = 'password'; document.getElementById('toggle-password-btn').innerHTML = '<i data-lucide="eye" class="w-5 h-5"></i>'; if(window.lucide) window.lucide.createIcons(); document.getElementById('login-modal').classList.replace('hidden', 'flex'); setTimeout(() => document.getElementById('login-password').focus(), 100); } };
        window.closeLoginModal = () => document.getElementById('login-modal').classList.replace('flex', 'hidden');
        window.submitLogin = function() { const p = document.getElementById('login-password').value; if (p === 'CoRf121') { isAdmin = true; isLeader = true; isEditing = false; window.closeLoginModal(); window.render(); window.showToast("Admin Unlocked"); } else if (p.toLowerCase() === 'plan121') { isAdmin = false; isLeader = true; isEditing = false; currentView = 'planner'; window.closeLoginModal(); window.render(); window.showToast("Planner Unlocked"); } else window.showToast("Invalid Key", true); };
        window.togglePasswordVisibility = function() { const i = document.getElementById('login-password'); const b = document.getElementById('toggle-password-btn'); if (i.type === 'password') { i.type = 'text'; b.innerHTML = '<i data-lucide="eye-off" class="w-4 h-4"></i>'; } else { i.type = 'password'; b.innerHTML = '<i data-lucide="eye" class="w-4 h-4"></i>'; } if(window.lucide) window.lucide.createIcons(); };
        window.toggleAdminMode = function() { isEditing = !isEditing; window.render(); }; window.toggleDarkMode = function() { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light'); window.render(); };

        function setModalVis(t) {
            const mg = document.getElementById('modal-grid'), ft = document.getElementById('field-title'), fu = document.getElementById('field-url'), fi = document.getElementById('field-image'), fc = document.getElementById('field-category'), fp = document.getElementById('field-preview'), fz = document.getElementById('field-zoom'), fb = document.getElementById('modal-save-btn'), fh = document.getElementById('app-icon-help-text'), fht = document.getElementById('field-header-type'), fhc = document.getElementById('field-header-colors'), fhi = document.getElementById('field-header-image'), fhtc = document.getElementById('field-header-text-colors'), fhls = document.getElementById('field-header-link-settings'), flb = document.getElementById('field-link-bg'), fle = document.getElementById('field-link-event');
            [ft, fu, fi, fc, fp, fz, fht, fhc, fhi, fhtc, fhls, flb, fle].forEach(el => el && el.classList.remove('hidden')); if (fh) fh.classList.add('hidden');
            mg.classList.add('md:grid-cols-2'); mg.classList.remove('grid-cols-1'); fb.classList.replace('w-auto', 'w-full');
            const pbox = document.getElementById('preview-box'); pbox.className = 'w-40 h-40 md:w-48 md:h-48 bg-slate-100 dark:bg-slate-800 rounded-[2rem] overflow-hidden relative border-[6px] border-slate-200 dark:border-slate-700 shadow-xl cursor-move active:cursor-grabbing'; pbox.style.webkitMaskImage = '-webkit-radial-gradient(white, black)'; pbox.style.maskImage = 'radial-gradient(white, black)';
            if (t === 'category') { mg.classList.remove('md:grid-cols-2'); mg.classList.add('grid-cols-1'); [fu, fi, fc, fp, fz, fht, fhc, fhi, fhtc, fhls, flb, fle].forEach(el => el && el.classList.add('hidden')); fb.classList.replace('w-full', 'w-auto'); }
            else if (t === 'link') [fht, fhc, fhi, fhtc, fhls].forEach(el => el && el.classList.add('hidden'));
            else if (t === 'header') { [fc, fht, fhc, fhi, flb, fle].forEach(el => el && el.classList.add('hidden')); if(fhtc){fhtc.classList.add('flex');fhtc.classList.remove('hidden');} if(fhls){fhls.classList.add('flex');fhls.classList.remove('hidden');} }
            else if (t === 'app-icon') { [ft, fu, fc, fht, fhc, fhi, fhtc, fhls, flb, fle].forEach(el => el && el.classList.add('hidden')); if(fh) fh.classList.remove('hidden'); }
            else if (t === 'header-design') { [ft, fu, fc, fi, flb, fle].forEach(el => el && el.classList.add('hidden')); if(fhtc){fhtc.classList.add('flex');fhtc.classList.remove('hidden');} if(fhls){fhls.classList.add('flex');fhls.classList.remove('hidden');} pbox.className = 'w-full h-24 bg-slate-100 rounded-xl overflow-hidden relative border-[6px] border-slate-200 shadow-xl cursor-move'; pbox.style.webkitMaskImage = 'none'; pbox.style.maskImage = 'none'; }
        }
        window.toggleLinkType = function() { const t = document.getElementById('input-link-type').value; if(t==='internal'){document.getElementById('input-url').classList.add('hidden');document.getElementById('input-internal-target').classList.remove('hidden');}else{document.getElementById('input-url').classList.remove('hidden');document.getElementById('input-internal-target').classList.add('hidden');} };
        
        window.openHeaderModal = function() { currentEditId = 'header'; currentEditType = 'header'; document.getElementById('modal-title').innerText = "Identity Settings"; document.getElementById('label-url').innerText = "Subtitle"; document.getElementById('label-image').innerText = "Main Logo URL"; document.getElementById('input-title').value = settings.title || ''; document.getElementById('input-url').value = settings.subtitle || ''; document.getElementById('input-image').value = settings.logo || ''; document.getElementById('input-zoom').value = settings.zoom || 1; document.getElementById('input-override-colors').checked = !!settings.overrideColors; document.getElementById('color-pickers-wrapper').style.display = settings.overrideColors ? 'grid' : 'none'; document.getElementById('input-title-color').value = settings.titleColor || '#1e3a8a'; document.getElementById('input-subtitle-color').value = settings.subtitleColor || '#64748b'; document.getElementById('input-show-header-link').checked = settings.showHeaderLink !== false; document.getElementById('input-header-link-text').value = settings.headerLinkText || 'my.scouting.org'; document.getElementById('input-header-link-url').value = settings.headerLinkUrl || 'https://my.scouting.org'; document.getElementById('input-link-type').parentElement.classList.add('hidden'); document.getElementById('input-url').classList.remove('hidden'); document.getElementById('input-internal-target').classList.add('hidden'); setModalVis('header'); window.updatePreview(); document.getElementById('modal-overlay').classList.replace('hidden', 'flex'); };
        window.openAppIconModal = function() { currentEditId = 'app-icon'; currentEditType = 'app-icon'; document.getElementById('modal-title').innerText = "Browser Tab & App Icon"; document.getElementById('label-image').innerText = "Icon URL"; document.getElementById('input-image').value = settings.tabIconUrl || ''; document.getElementById('input-zoom').value = settings.tabIconZoom || 1; setModalVis('app-icon'); window.updatePreview(); document.getElementById('modal-overlay').classList.replace('hidden', 'flex'); };
        window.openHeaderDesignModal = function() { currentEditId = 'header-design'; currentEditType = 'header-design'; document.getElementById('modal-title').innerText = "Header Background"; document.getElementById('input-header-bg-type').value = settings.headerBgType || 'default'; document.getElementById('input-header-bg-color').value = settings.headerBgColor || '#ffffff'; document.getElementById('input-header-border-color').value = settings.headerBorderColor || '#facc15'; document.getElementById('input-header-bg-image').value = settings.headerBgImage || ''; document.getElementById('input-zoom').value = settings.headerBgZoom || 1; document.getElementById('input-override-colors').checked = !!settings.overrideColors; document.getElementById('color-pickers-wrapper').style.display = settings.overrideColors ? 'grid' : 'none'; document.getElementById('input-title-color').value = settings.titleColor || '#1e3a8a'; document.getElementById('input-subtitle-color').value = settings.subtitleColor || '#64748b'; document.getElementById('input-show-header-link').checked = settings.showHeaderLink !== false; document.getElementById('input-header-link-text').value = settings.headerLinkText || 'my.scouting.org'; document.getElementById('input-header-link-url').value = settings.headerLinkUrl || 'https://my.scouting.org'; setModalVis('header-design'); window.updatePreview(); document.getElementById('modal-overlay').classList.replace('hidden', 'flex'); };
        window.editLink = function(id) { currentEditId = id; currentEditType = 'link'; const link = links.find(l => l.id === id); document.getElementById('modal-title').innerText = "Tile Settings"; document.getElementById('label-url').innerText = "Target / URL"; document.getElementById('label-image').innerText = "Image URL"; document.getElementById('input-title').value = link.title; document.getElementById('input-image').value = link.img; document.getElementById('input-zoom').value = link.zoom || 1; document.getElementById('input-link-custom-bg-enable').checked = !!link.customBg; document.getElementById('input-link-bg').disabled = !link.customBg; document.getElementById('input-link-bg').value = link.bgColor || '#ffffff'; document.getElementById('input-link-is-event').checked = !!link.isEvent; document.getElementById('link-event-date-wrapper').style.display = link.isEvent ? 'block' : 'none'; document.getElementById('input-link-event-date').value = link.eventDate || ''; document.getElementById('input-link-type').parentElement.classList.remove('hidden'); const isInt = link.url && link.url.startsWith('#'); document.getElementById('input-link-type').value = isInt ? 'internal' : 'external'; if(isInt) document.getElementById('input-internal-target').value = link.url; else document.getElementById('input-url').value = link.url; window.toggleLinkType(); const sel = document.getElementById('input-category'); sel.innerHTML = ''; categories.forEach(cat => { const opt = document.createElement('option'); opt.value = cat.id; opt.innerText = cat.title; if (cat.id === link.categoryId) opt.selected = true; sel.appendChild(opt); }); setModalVis('link'); window.updatePreview(); document.getElementById('modal-overlay').classList.replace('hidden', 'flex'); };
        window.addNewLink = function(cid) { const id = Date.now(); links.push({ id, title: 'New Link', url: '', img: '', zoom: 1, x: 0, y: 0, categoryId: cid, customBg: false, bgColor: '#ffffff', isEvent: false, eventDate: '' }); window.editLink(id); };
        window.deleteLink = function(id) { if (confirm("Remove tile?")) { links = links.filter(l => l.id !== id); window.render(); if(useFirebase) window.syncToCloud(); } };
        window.editCategory = function(id) { currentEditId = id; currentEditType = 'category'; document.getElementById('modal-title').innerText = "Category Name"; document.getElementById('input-title').value = categories.find(c => c.id === id).title; setModalVis('category'); document.getElementById('modal-overlay').classList.replace('hidden', 'flex'); }
        window.addNewCategory = function() { const id = 'cat_' + Date.now(); categories.push({ id, title: 'New Category' }); window.editCategory(id); }
        window.deleteCategory = function(id) { if (confirm("Delete category & links?")) { categories = categories.filter(c => c.id !== id); links = links.filter(l => l.categoryId !== id); window.render(); if(useFirebase) window.syncToCloud(); } }
        window.closeModal = () => document.getElementById('modal-overlay').classList.replace('flex', 'hidden');

        window.updatePreview = function() {
            if (currentEditType === 'category') return;
            const img = document.getElementById('preview-img'); const pbox = document.getElementById('preview-box'); const z = document.getElementById('input-zoom').value || 1;
            if (currentEditType === 'header-design') {
                const bt = document.getElementById('input-header-bg-type').value; const bc = document.getElementById('input-header-bg-color').value; const bi = document.getElementById('input-header-bg-image').value;
                document.getElementById('field-header-colors').classList.remove('hidden'); document.getElementById('input-header-bg-color').parentElement.style.display = bt === 'color' ? 'block' : 'none'; document.getElementById('field-header-image').style.display = bt === 'image' ? 'block' : 'none'; document.getElementById('field-zoom').style.display = bt === 'image' ? 'block' : 'none';
                pbox.style.borderColor = document.getElementById('input-header-border-color').value;
                if (bt === 'color') { pbox.style.backgroundColor = bc; img.style.display = 'none'; } else if (bt === 'image') { pbox.style.backgroundColor = '#f1f5f9'; img.style.display = 'block'; img.src = bi || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png'; img.className = "absolute inset-0 w-full h-full object-cover pointer-events-none"; img.style.transform = `translate(${settings.headerBgX || 0}%, ${settings.headerBgY || 0}%) scale(${z})`; } else { pbox.style.backgroundColor = document.documentElement.classList.contains('dark') ? '#0f172a' : '#ffffff'; img.style.display = 'none'; }
            } else {
                img.style.display = 'block'; img.className = "absolute inset-0 w-full h-full object-contain pointer-events-none"; img.src = document.getElementById('input-image').value || 'https://www.scouting.org/wp-content/uploads/2018/05/cub-scouts-logo.png';
                let obj = currentEditType === 'header' || currentEditType === 'app-icon' ? settings : links.find(l => l.id === currentEditId);
                if (obj) img.style.transform = `translate(${currentEditType==='app-icon'?(obj.tabIconX||0):(obj.x||0)}%, ${currentEditType==='app-icon'?(obj.tabIconY||0):(obj.y||0)}%) scale(${z})`;
                if (currentEditType === 'link') pbox.style.backgroundColor = document.getElementById('input-link-custom-bg-enable').checked ? document.getElementById('input-link-bg').value : (document.documentElement.classList.contains('dark') ? '#1e293b' : '#f1f5f9');
                else if (currentEditType === 'app-icon' || currentEditType === 'header') pbox.style.backgroundColor = document.documentElement.classList.contains('dark') ? '#1e293b' : '#f1f5f9';
            }
            document.getElementById('zoom-val').innerText = parseFloat(z).toFixed(2) + 'x';
        };

        window.saveChanges = function() {
            if (currentEditType === 'header') { settings.title = document.getElementById('input-title').value; settings.subtitle = document.getElementById('input-url').value; settings.logo = document.getElementById('input-image').value; settings.zoom = parseFloat(document.getElementById('input-zoom').value) || 1; settings.overrideColors = document.getElementById('input-override-colors').checked; settings.titleColor = document.getElementById('input-title-color').value; settings.subtitleColor = document.getElementById('input-subtitle-color').value; settings.showHeaderLink = document.getElementById('input-show-header-link').checked; settings.headerLinkText = document.getElementById('input-header-link-text').value; settings.headerLinkUrl = document.getElementById('input-header-link-url').value; }
            else if (currentEditType === 'app-icon') { settings.tabIconUrl = document.getElementById('input-image').value; settings.tabIconZoom = parseFloat(document.getElementById('input-zoom').value) || 1; }
            else if (currentEditType === 'header-design') { settings.headerBgType = document.getElementById('input-header-bg-type').value; settings.headerBgColor = document.getElementById('input-header-bg-color').value; settings.headerBorderColor = document.getElementById('input-header-border-color').value; settings.headerBgImage = document.getElementById('input-header-bg-image').value; settings.headerBgZoom = parseFloat(document.getElementById('input-zoom').value) || 1; settings.overrideColors = document.getElementById('input-override-colors').checked; settings.titleColor = document.getElementById('input-title-color').value; settings.subtitleColor = document.getElementById('input-subtitle-color').value; settings.showHeaderLink = document.getElementById('input-show-header-link').checked; settings.headerLinkText = document.getElementById('input-header-link-text').value; settings.headerLinkUrl = document.getElementById('input-header-link-url').value; }
            else if (currentEditType === 'category') { const cat = categories.find(c => c.id === currentEditId); if (cat) cat.title = document.getElementById('input-title').value || 'Unnamed Category'; }
            else if (currentEditType === 'link') { const link = links.find(l => l.id === currentEditId); if (link) { link.title = document.getElementById('input-title').value; let t = document.getElementById('input-link-type').value; let su = t === 'internal' ? document.getElementById('input-internal-target').value : document.getElementById('input-url').value.trim(); if (su && !su.startsWith('http') && !su.startsWith('#')) su = 'https://' + su; link.url = su; link.categoryId = document.getElementById('input-category').value; link.img = document.getElementById('input-image').value; link.zoom = document.getElementById('input-zoom').value; link.customBg = document.getElementById('input-link-custom-bg-enable').checked; link.bgColor = document.getElementById('input-link-bg').value; link.isEvent = document.getElementById('input-link-is-event').checked; link.eventDate = document.getElementById('input-link-event-date').value; } }
            window.closeModal(); window.render(); if (useFirebase) window.syncToCloud();
        };

        window.onload = () => window.render();
        document.getElementById('input-image').addEventListener('input', window.updatePreview); document.getElementById('input-zoom').addEventListener('input', window.updatePreview);
        document.getElementById('preview-box').addEventListener('mousedown', (e) => { if (currentEditType === 'category') return; isDragging = true; startX = e.clientX; startY = e.clientY; });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return; const dx = e.clientX - startX; const dy = e.clientY - startY; startX = e.clientX; startY = e.clientY;
            const r = document.getElementById('preview-box').getBoundingClientRect(); if (r.width === 0 || r.height === 0) return;
            let obj = currentEditType === 'header' || currentEditType === 'app-icon' || currentEditType === 'header-design' ? settings : links.find(l => l.id === currentEditId);
            if (obj) { if (currentEditType === 'app-icon') { obj.tabIconX = (obj.tabIconX||0)+((dx/r.width)*100); obj.tabIconY = (obj.tabIconY||0)+((dy/r.height)*100); } else if (currentEditType === 'header-design') { obj.headerBgX = (obj.headerBgX||0)+((dx/r.width)*100); obj.headerBgY = (obj.headerBgY||0)+((dy/r.height)*100); } else { obj.x = (obj.x||0)+((dx/r.width)*100); obj.y = (obj.y||0)+((dy/r.height)*100); } window.updatePreview(); }
        });
        window.addEventListener('mouseup', () => isDragging = false);
    </script>
